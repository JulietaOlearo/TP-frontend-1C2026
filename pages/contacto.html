  <nav class="header-nav">

  </ul>
</nav>
</header>

<main>

  <section class="contacto">

    <h2>Contacto</h2>
    <p>Escribinos por WhatsApp, Instagram o completá el formulario.</p>

    <!-- REDES -->
    <div class="redes">

      <a href="https://wa.me/5491112345678" target="_blank" class="btn">
        <i class="fa-brands fa-whatsapp"></i>
        WhatsApp
      </a>

      <a href="https://instagram.com/tuusuario" target="_blank" class="btn">
        <i class="fa-brands fa-instagram"></i>
        Instagram
      </a>

    </div>

    <!-- FORMULARIO FORMSPREE -->
    <form action="https://formspree.io/f/mqegjako" method="POST" class="form-contacto">

      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="mensaje">Mensaje</label>
      <textarea id="mensaje" name="mensaje" rows="4" required></textarea>

      <button type="submit" class="btn">Enviar</button>

    </form>

  </section>

</main>

<footer>
  <p>© 2026 Perfumes VS</p>
</footer>

</body>
